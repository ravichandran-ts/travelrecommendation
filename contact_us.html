<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - JS Travel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">
            <h2>JS Travel</h2>
        </div>
        <div class="nav-links">
            <a href="travel_recommendation.html">Home</a>
            <a href="about_us.html">About Us</a>
            <a href="contact_us.html">Contact Us</a>
        </div>
    </nav>

    <main class="content-container">
        <section class="contact-section">
            <h1>Contact Us</h1>
            <p>Have questions? We would love to hear from you. Fill out the form below and we will get back to you shortly.</p>
            
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email address">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contactForm = document.getElementById("contactForm");

            if (contactForm) {
                contactForm.addEventListener("submit", function(event) {
                    // Prevent the page from refreshing or erroring out
                    event.preventDefault(); 

                    // Display a success message to the user
                    alert("Thank you for reaching out! Your message has been received and we will get back to you shortly.");

                    // Redirect the user back to the home page
                    window.location.href = "travel_recommendation.html";
                });
            } else {
                console.error("Could not find the form element!");
            }
        });
    </script>
</body>
</html>
